# ── ACME Challenge (Let's Encrypt) ───────────────────────────────
server {
    listen 80;
    server_name vaqueroisi.org auth.vaqueroisi.org lab.vaqueroisi.org;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Main Website: vaqueroisi.org ─────────────────────────────────
server {
    listen 443 ssl;
    server_name vaqueroisi.org;

    ssl_certificate /etc/letsencrypt/live/vaqueroisi.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vaqueroisi.org/privkey.pem;
    include /etc/nginx/conf.d/ssl-params.conf;

    location / {
        proxy_pass http://web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── Keycloak: auth.vaqueroisi.org ────────────────────────────────
server {
    listen 443 ssl;
    server_name auth.vaqueroisi.org;

    ssl_certificate /etc/letsencrypt/live/vaqueroisi.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vaqueroisi.org/privkey.pem;
    include /etc/nginx/conf.d/ssl-params.conf;

    location / {
        proxy_pass http://keycloak:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}

# ── Lab (Protected): lab.vaqueroisi.org ──────────────────────────
server {
    listen 443 ssl;
    server_name lab.vaqueroisi.org;

    ssl_certificate /etc/letsencrypt/live/vaqueroisi.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vaqueroisi.org/privkey.pem;
    include /etc/nginx/conf.d/ssl-params.conf;

    location /oauth2/ {
        proxy_pass http://oauth2-proxy:4180;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        # Check auth with oauth2-proxy
        auth_request /oauth2/auth;
        error_page 401 =302 https://auth.vaqueroisi.org/realms/visi/protocol/openid-connect/auth?client_id=visi-lab&redirect_uri=https://lab.vaqueroisi.org/oauth2/callback&response_type=code&scope=openid;

        # Pass user info from oauth2-proxy to upstream
        auth_request_set $user $upstream_http_x_auth_request_user;
        auth_request_set $email $upstream_http_x_auth_request_email;
        auth_request_set $token $upstream_http_x_auth_request_access_token;
        proxy_set_header X-User $user;
        proxy_set_header X-Email $email;
        proxy_set_header X-Access-Token $token;

        proxy_pass http://oauth2-proxy:4180;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
