# VISI Website - Docker Compose
#
# Usage:
#   docker compose up -d --build
#
# The site will be available at http://localhost:3000

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    restart: unless-stopped
    ports:
      - "3000:80"
