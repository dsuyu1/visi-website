# VISI Platform - Docker Compose
#
# Architecture:
#   nginx (reverse proxy) → routes subdomains
#     ├── vaqueroisi.org       → static site (visi-website)
#     ├── auth.vaqueroisi.org  → Keycloak (identity provider)
#     └── lab.vaqueroisi.org   → oauth2-proxy → lab app (protected)
#
# Usage:
#   1. Copy .env.example to .env and fill in values
#   2. docker compose up -d --build
#
# For local development, add to /etc/hosts:
#   127.0.0.1 vaqueroisi.org auth.vaqueroisi.org lab.vaqueroisi.org

services:
  # ── Reverse Proxy ──────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - web
      - keycloak
      - oauth2-proxy

  # ── SSL Certificate Renewal ───────────────────────────────────
  certbot:
    image: certbot/certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # ── Static Website ────────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"

  # ── Keycloak (Identity Provider) ──────────────────────────────
  keycloak:
    image: quay.io/keycloak/keycloak:26.1
    restart: unless-stopped
    command: start
    environment:
      KC_HOSTNAME: ${KC_HOSTNAME:-auth.vaqueroisi.org}
      KC_PROXY_HEADERS: xforwarded
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:5432/keycloak
      KC_DB_USERNAME: ${KC_DB_USERNAME:-keycloak}
      KC_DB_PASSWORD: ${KC_DB_PASSWORD:-changeme}
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KC_ADMIN_USERNAME:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KC_ADMIN_PASSWORD:-changeme}
    expose:
      - "8080"
    depends_on:
      keycloak-db:
        condition: service_healthy

  # ── Keycloak Database ─────────────────────────────────────────
  keycloak-db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: ${KC_DB_USERNAME:-keycloak}
      POSTGRES_PASSWORD: ${KC_DB_PASSWORD:-changeme}
    volumes:
      - keycloak-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KC_DB_USERNAME:-keycloak}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── OAuth2 Proxy (guards lab.vaqueroisi.org) ──────────────────
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
    restart: unless-stopped
    command:
      - --http-address=0.0.0.0:4180
      - --upstream=http://lab:8080
      - --provider=keycloak-oidc
      - --client-id=${OAUTH2_CLIENT_ID:-visi-lab}
      - --client-secret=${OAUTH2_CLIENT_SECRET:-changeme}
      - --oidc-issuer-url=https://${KC_HOSTNAME:-auth.vaqueroisi.org}/realms/${KC_REALM:-visi}
      - --cookie-secret=${OAUTH2_COOKIE_SECRET:-}
      - --cookie-secure=true
      - --cookie-domains=.vaqueroisi.org
      - --email-domain=*
      - --redirect-url=https://lab.vaqueroisi.org/oauth2/callback
      - --skip-provider-button=true
      - --pass-authorization-header=true
      - --pass-access-token=true
      - --set-xauthrequest=true
      - --reverse-proxy=true
    expose:
      - "4180"
    depends_on:
      - keycloak

  # ── Lab Application (your actual lab content) ─────────────────
  # Replace this with your actual lab application
  lab:
    image: nginx:alpine
    restart: unless-stopped
    volumes:
      - ./lab/index.html:/usr/share/nginx/html/index.html:ro
      - ./lab/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "8080"

volumes:
  keycloak-db-data:
