<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaquero Labs</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', system-ui, sans-serif;
            background: #0a0a0a;
            color: #e5e5e5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 2rem;
        }
        h1 {
            font-size: 2.5rem;
            color: #D95D39;
            margin-bottom: 1rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        p {
            color: #888;
            font-size: 1.1rem;
            margin-bottom: 2rem;
        }
        .status {
            display: inline-block;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 1rem 2rem;
            font-size: 0.9rem;
            color: #6ee7b7;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vaquero Labs</h1>
        <p>Welcome to the VISI Cybersecurity Lab Environment</p>
        <div class="status">Authenticated — Lab environment loading...</div>
    </div>
</body>
</html>
